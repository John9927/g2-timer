<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>G2 Timer</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: monospace;
        background: #000;
        color: #0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      #debug-container {
        width: 576px;
        height: 288px;
        border: 2px solid #0f0;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .debug-line {
        font-size: 16px;
        line-height: 1.5;
      }
      .status {
        color: #ff0;
      }
      .error {
        color: #f00;
      }
      .success {
        color: #0f0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="debug-container">
      <div class="debug-line">G2 Timer - Debug View</div>
      <div class="debug-line status" id="bridge-status">Waiting for bridge...</div>
      <div class="debug-line" id="timer-display">--:--</div>
      <div class="debug-line" id="preset-display">Presets: 1 3 5 10 15 30 60</div>
      <div class="debug-line" id="state-display">State: --</div>
      <div class="debug-line" id="container-status">Containers: --</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
