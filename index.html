<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>G2 Timer – Remote control</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-subtle: #f8f9fa;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #1a1a1a;
        --text-muted: #6b7280;
        --accent: #1a1a1a;
        --accent-inverse: #ffffff;
        --success: #22c55e;
        --danger: #ef4444;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }
      .header {
        width: 100%;
        max-width: 360px;
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text);
        margin: 0;
        letter-spacing: -0.02em;
      }
      #remote-container {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      #remote-preset-section label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #remote-preset-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .preset-btn {
        flex: 1 1 calc(25% - 6px);
        min-width: 52px;
        padding: 12px 8px;
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .preset-btn:hover:not(:disabled), .preset-btn:active:not(:disabled) {
        background: var(--bg-subtle);
        border-color: var(--text-muted);
      }
      .preset-btn.selected {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-inverse);
      }
      .preset-btn.selected:hover:not(:disabled), .preset-btn.selected:active:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-inverse);
        opacity: 0.9;
      }
      .preset-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .action-row {
        display: flex;
        gap: 10px;
      }
      .action-row button {
        flex: 1;
        padding: 14px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.05s;
      }
      .action-row button:active:not(:disabled) {
        transform: scale(0.98);
      }
      .action-row button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      #btn-start-pause {
        background: var(--accent);
        color: var(--accent-inverse);
        border: 1px solid var(--accent);
      }
      #btn-start-pause:hover:not(:disabled) {
        opacity: 0.9;
      }
      #btn-start-pause.pause-mode {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }
      #btn-start-pause.pause-mode:hover:not(:disabled) {
        background: var(--bg-subtle);
      }
      #btn-reset {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }
      #btn-reset:hover:not(:disabled) {
        background: var(--bg-subtle);
        border-color: var(--text-muted);
      }
      #remote-status {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: center;
        padding-top: 12px;
        margin-top: 4px;
        border-top: 1px solid var(--border);
      }
      #remote-status.connected {
        color: var(--success);
      }
      #remote-status.error {
        color: var(--danger);
      }
      #telemetry-card label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #telemetry-summary {
        font-size: 0.78rem;
        color: var(--text-muted);
        line-height: 1.45;
        min-height: 84px;
      }
      #telemetry-log {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-subtle);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.68rem;
        line-height: 1.4;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>G2 Timer</h1>
    </div>
    <div id="remote-container">
      <div class="card" id="remote-preset-section">
        <label>Duration (minutes)</label>
        <div id="remote-preset-buttons">
          <button type="button" class="preset-btn" data-preset="1">1</button>
          <button type="button" class="preset-btn" data-preset="3">3</button>
          <button type="button" class="preset-btn" data-preset="5">5</button>
          <button type="button" class="preset-btn" data-preset="10">10</button>
          <button type="button" class="preset-btn" data-preset="15">15</button>
          <button type="button" class="preset-btn" data-preset="30">30</button>
          <button type="button" class="preset-btn" data-preset="60">60</button>
        </div>
      </div>
      <div class="card" id="remote-actions">
        <div class="action-row">
          <button type="button" id="btn-start-pause" disabled>Start</button>
          <button type="button" id="btn-reset" disabled>Cancel / Reset</button>
        </div>
      </div>
      <div class="card" id="telemetry-card">
        <label>Telemetry (phone)</label>
        <div id="telemetry-summary">Waiting for samples...</div>
        <div id="telemetry-log">No render samples yet.</div>
      </div>
      <p id="remote-status">Connecting...</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
