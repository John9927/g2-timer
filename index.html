<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>G2 Timer – Remote control</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-subtle: #f8f9fa;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #1a1a1a;
        --text-muted: #6b7280;
        --accent: #1a1a1a;
        --accent-inverse: #ffffff;
        --success: #22c55e;
        --danger: #ef4444;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      html {
        overflow-x: hidden;
      }
      body {
        margin: 0;
        padding: 5px 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      .header {
        width: 100%;
        max-width: 360px;
        padding: 0 16px;
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text);
        margin: 0;
        letter-spacing: -0.02em;
      }
      #remote-container {
        width: 100%;
        max-width: 360px;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .card label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #remote-preset-section label {
        margin-bottom: 10px;
      }
      #remote-preset-buttons,
      #remote-screen-buttons,
      .layout-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .preset-tools {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .field-row {
        display: flex;
        gap: 8px;
      }
      .preset-input {
        flex: 1;
        min-width: 0;
        padding: 12px 12px;
        font-size: 0.95rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--text);
      }
      .preset-input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .inline-btn {
        flex: 0 0 auto;
        padding: 12px 14px;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--text);
        cursor: pointer;
      }
      .inline-btn:hover:not(:disabled),
      .inline-btn:active:not(:disabled) {
        background: var(--bg-subtle);
        border-color: var(--text-muted);
      }
      .inline-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .helper-text {
        margin: -2px 2px 0;
        font-size: 0.75rem;
        line-height: 1.35;
        color: var(--text-muted);
      }
      .preset-btn,
      .screen-btn,
      .layout-btn {
        flex: 1 1 calc(25% - 6px);
        min-width: 52px;
        padding: 12px 8px;
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .screen-btn,
      .layout-btn {
        flex: 1 1 0;
        min-width: 84px;
      }
      .preset-btn:hover:not(:disabled), .preset-btn:active:not(:disabled),
      .screen-btn:hover:not(:disabled), .screen-btn:active:not(:disabled),
      .layout-btn:hover:not(:disabled), .layout-btn:active:not(:disabled) {
        background: var(--bg-subtle);
        border-color: var(--text-muted);
      }
      .preset-btn.selected,
      .screen-btn.selected,
      .layout-btn.selected {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-inverse);
      }
      .preset-btn.selected:hover:not(:disabled), .preset-btn.selected:active:not(:disabled),
      .screen-btn.selected:hover:not(:disabled), .screen-btn.selected:active:not(:disabled),
      .layout-btn.selected:hover:not(:disabled), .layout-btn.selected:active:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-inverse);
        opacity: 0.9;
      }
      .preset-btn:disabled,
      .screen-btn:disabled,
      .layout-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #glasses-view-summary {
        font-size: 0.92rem;
        line-height: 1.4;
        color: var(--text);
        margin-bottom: 12px;
      }
      .layout-group + .layout-group {
        margin-top: 12px;
      }
      .layout-group span {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .action-row {
        display: flex;
        gap: 10px;
      }
      .action-row button {
        flex: 1;
        padding: 14px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.05s;
      }
      .action-row button:active:not(:disabled) {
        transform: scale(0.98);
      }
      .action-row button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      #btn-start-pause {
        background: var(--accent);
        color: var(--accent-inverse);
        border: 1px solid var(--accent);
      }
      #btn-start-pause:hover:not(:disabled) {
        opacity: 0.9;
      }
      #btn-start-pause.pause-mode {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }
      #btn-start-pause.pause-mode:hover:not(:disabled) {
        background: var(--bg-subtle);
      }
      #btn-reset {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
      }
      #btn-reset:hover:not(:disabled) {
        background: var(--bg-subtle);
        border-color: var(--text-muted);
      }
      #remote-status {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: center;
        padding-top: 12px;
        margin-top: 4px;
        border-top: 1px solid var(--border);
      }
      #remote-status.connected {
        color: var(--success);
      }
      #remote-status.error {
        color: var(--danger);
      }
      #telemetry-card label {
        font-size: 0.72rem;
        font-weight: 600;
        margin-bottom: 8px;
      }
      #telemetry-summary {
        font-size: 0.78rem;
        color: var(--text-muted);
        line-height: 1.45;
        min-height: 84px;
      }
      #telemetry-log {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-subtle);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.68rem;
        line-height: 1.4;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>G2 Timer</h1>
    </div>
    <div id="remote-container">
      <div class="card" id="display-state-card">
        <label>Glasses screen</label>
        <div id="glasses-view-summary">Connecting...</div>
        <div id="remote-screen-buttons">
          <button type="button" class="screen-btn" data-screen="home">Menu</button>
          <button type="button" class="screen-btn" data-screen="timer">Timer</button>
          <button type="button" class="screen-btn" data-screen="settings">Settings</button>
        </div>
        <div id="remote-gesture-help" class="helper-text">Glasses controls load after connection.</div>
      </div>
      <div class="card" id="remote-preset-section">
        <label>Duration (minutes)</label>
        <div id="remote-preset-buttons">
          <button type="button" class="preset-btn" data-preset="1">1</button>
          <button type="button" class="preset-btn" data-preset="3">3</button>
          <button type="button" class="preset-btn" data-preset="5">5</button>
          <button type="button" class="preset-btn" data-preset="10">10</button>
          <button type="button" class="preset-btn" data-preset="15">15</button>
          <button type="button" class="preset-btn" data-preset="30">30</button>
          <button type="button" class="preset-btn" data-preset="60">60</button>
        </div>
        <div class="preset-tools">
          <div class="field-row">
            <input id="exact-minute-input" class="preset-input" type="number" min="1" max="999" inputmode="numeric" placeholder="Exact minutes" />
            <button type="button" id="apply-minute-btn" class="inline-btn">Apply</button>
          </div>
          <div class="helper-text">Pick any duration from 1 to 999 minutes.</div>
          <div class="field-row">
            <input id="custom-presets-input" class="preset-input" type="text" placeholder="2, 5, 10, 15" />
            <button type="button" id="save-custom-presets" class="inline-btn">Save</button>
          </div>
          <div class="helper-text">Comma-separated shortcuts shown in the buttons above, up to 8 values.</div>
        </div>
      </div>
      <div class="card" id="layout-controls">
        <label>Timer display</label>
        <div class="layout-group">
          <span>Size</span>
          <div class="layout-row">
            <button type="button" class="layout-btn" data-field="format" data-value="large">Large</button>
            <button type="button" class="layout-btn" data-field="format" data-value="compact">Small</button>
          </div>
        </div>
        <div class="layout-group">
          <span>Vertical</span>
          <div class="layout-row">
            <button type="button" class="layout-btn" data-field="vertical" data-value="top">Top</button>
            <button type="button" class="layout-btn" data-field="vertical" data-value="center">Center</button>
            <button type="button" class="layout-btn" data-field="vertical" data-value="bottom">Bottom</button>
          </div>
        </div>
        <div class="layout-group">
          <span>Horizontal</span>
          <div class="layout-row">
            <button type="button" class="layout-btn" data-field="horizontal" data-value="left">Left</button>
            <button type="button" class="layout-btn" data-field="horizontal" data-value="center">Center</button>
            <button type="button" class="layout-btn" data-field="horizontal" data-value="right">Right</button>
          </div>
        </div>
      </div>
      <div class="card" id="remote-actions">
        <div class="action-row">
          <button type="button" id="btn-start-pause" disabled>Start</button>
          <button type="button" id="btn-reset" disabled>Cancel / Reset</button>
        </div>
      </div>
      <div class="card" id="telemetry-card">
        <label>Telemetry (phone)</label>
        <div id="telemetry-summary">Waiting for samples...</div>
        <div id="telemetry-log">No render samples yet.</div>
      </div>
      <p id="remote-status">Connecting...</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
